name: Build Windows

on:
  workflow_dispatch:
  push:

jobs:
  build:
    runs-on: windows-latest

    defaults:
      run:
        shell: bash

    env:
      BUILD_DEFINES: -DGITHUB_BUILD

    steps:
      # 📥 Checkout
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # ⚡ Cache Haxelib (GANHO DE VELOCIDADE)
      - name: Cache Haxelib
        uses: actions/cache@v4
        with:
          path: |
            ~/haxelib
            .haxelib
          key: haxelib-${{ runner.os }}-${{ hashFiles('**/hmm.json') }}
          restore-keys: |
            haxelib-${{ runner.os }}

      # 🧠 Setup Haxe
      - name: Setup Haxe
        uses: krdlab/setup-haxe@v1
        with:
          haxe-version: 4.3.3

      # 📦 Setup repo do haxelib
      - name: Setup haxelib
        run: |
          mkdir -p ~/haxelib
          haxelib setup ~/haxelib

      # 🔥 INSTALAÇÃO FORÇADA (resolve o bug do hxp)
      - name: Install core libs
        run: |
          haxelib install hxp --quiet || true
          haxelib install hmm --quiet || true
          haxelib install lime --quiet || true
          haxelib install openfl --quiet || true
          haxelib install flixel --quiet || true
          haxelib install flixel-tools --quiet || true
          haxelib install hxcpp --quiet || true

      # 🧩 Instalar deps do projeto (se tiver hmm.json)
      - name: Install project dependencies
        run: |
          if [ -f "hmm.json" ]; then
            haxelib run hmm install
          fi

      # ⚙️ Setup Lime
      - name: Setup Lime
        run: |
          haxelib run lime setup

      # 💥 Compilar HXCPP (FIX REAL)
      - name: Compile HXCPP
        run: |
          HXCPP_PATH=$(haxelib path hxcpp | grep -v "^-" | head -n 1)
          cd "$HXCPP_PATH/tools/hxcpp"
          haxe compile.hxml

      # ⚡ Cache HXCPP (acelera MUITO builds futuros)
      - name: Cache HXCPP
        uses: actions/cache@v4
        with:
          path: /usr/share/hxcpp
          key: hxcpp-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            hxcpp-${{ runner.os }}

      # 🏗️ BUILD
      - name: Build Game
        run: |
          haxelib run lime build windows -release $BUILD_DEFINES

      # 💾 Upload
      - name: Upload Build
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: export/release/windows/bin/