name: Build Windows Game

on:
  workflow_dispatch:
    inputs:
      build-defines:
        type: string
        default: '-DGITHUB_BUILD'
      save-artifact:
        type: boolean
        default: true
  push:

jobs:
  build-windows:
    runs-on: windows-latest

    defaults:
      run:
        shell: bash

    env:
      BUILD_DEFINES: ${{ github.event.inputs.build-defines || '-DGITHUB_BUILD' }}

    steps:
      - name: Fix git safe directory
        run: git config --global --add safe.directory $GITHUB_WORKSPACE

      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # 🔧 Setup Haxe + Lime (igual Psych Engine usa)
      - name: Setup Haxe
        uses: krdlab/setup-haxe@v1
        with:
          haxe-version: 4.3.3

      - name: Install Haxelib dependencies
        run: |
          haxelib setup ~/haxelib
          haxelib install lime
          haxelib install openfl
          haxelib install flixel
          haxelib install flixel-tools
          haxelib install hxcpp

      - name: Setup Lime
        run: |
          haxelib run lime setup

      # 🔥 Compilar HXCPP (IMPORTANTE)
      - name: Compile HXCPP
        run: |
          cd ~/haxelib/hxcpp/*/tools/hxcpp
          haxe compile.hxml

      # 📦 Build do jogo
      - name: Build Windows
        run: |
          haxelib run lime build windows -release $BUILD_DEFINES

      # 💾 Salvar build
      - name: Upload Artifact
        if: ${{ github.event.inputs.save-artifact }}
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: export/release/windows/bin/
